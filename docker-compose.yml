networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

services:
  nats:
    image: nats:2-alpine
    restart: unless-stopped
    networks:
      - internal

  mongodb:
    image: mongo:7
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: blackbox
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    build:
      context: ./apps/core
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
      - public
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/blackbox
      MESSAGE_BROKER_URL: nats://nats:4222
      WORKER_POOL_SIZE: "10"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "8080"
    depends_on:
      mongodb:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - public
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
      CORE_API_URL: http://core:8080
    depends_on:
      - core

volumes:
  mongo_data:
